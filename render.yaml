services:
  - type: web
    name: ai-interview-trainer
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-interview-trainer-backend.onrender.com/api
      - key: VITE_USE_MOCK
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: ai-interview-trainer-backend
    runtime: python
    region: singapore
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PROVIDER
        value: openai
      - key: MODEL_NAME
        value: deepseek-chat
      - key: API_BASE_URL
        value: https://api.deepseek.com/v1/chat/completions
      - key: FRONTEND_URL
        value: https://ai-interview-trainer.onrender.com
      - key: API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
